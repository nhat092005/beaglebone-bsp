# BeagleBone Black BSP layer — Yocto Project Kirkstone (4.0.x)

BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-bbb"
BBFILE_PATTERN_meta-bbb = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-bbb = "10"

LAYERVERSION_meta-bbb = "1"
LAYERDEPENDS_meta-bbb = "core openembedded-layer"
LAYERSERIES_COMPAT_meta-bbb = "kirkstone"
