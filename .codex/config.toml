#:schema https://developers.openai.com/codex/config-schema.json

personality = "pragmatic"
model_reasoning_effort = "high"
model_verbosity = "medium"

approval_policy = "on-request"
approvals_reviewer = "user"
sandbox_mode = "workspace-write"
web_search = "cached"
project_doc_max_bytes = 65536

developer_instructions = """
Codex-only policy for beaglebone-bsp:
- Treat AGENTS.md as the canonical project instruction file.
- Start project work by reading AGENTS.md and vault/wiki/_master-index.md.
- Use rtk prefix for shell commands.
- Keep changes surgical and preserve unrelated dirty work.
- Do not flash, deploy, SSH, serial-console, or touch live board hardware without explicit user approval.
- Do not store secrets, board credentials, or host-specific paths in tracked .codex or .agents files.
"""

[sandbox_workspace_write]
network_access = false
exclude_tmpdir_env_var = true
exclude_slash_tmp = true

[features]
hooks = true
multi_agent = true

[agents]
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

[agents.researcher]
description = "Read-only researcher for AM335x, BeagleBone Black, kernel, U-Boot, Yocto, FreeRTOS, and BSP context."
config_file = "agents/researcher.toml"
nickname_candidates = ["Researcher", "Scout"]

[agents.architect]
description = "Read-only BSP architect for driver architecture, DTS design, boot flow, Yocto integration, and ADR-level tradeoffs."
config_file = "agents/architect.toml"
nickname_candidates = ["Architect", "Planner"]

[agents.cpp-reviewer]
description = "Read-only C/C++ reviewer for kernel, FreeRTOS, U-Boot, DTS-adjacent C, and embedded safety issues."
config_file = "agents/cpp-reviewer.toml"
nickname_candidates = ["C Reviewer", "Safety Reviewer"]

[agents.reviewer]
description = "Read-only general reviewer for DTS, Makefiles, shell, Yocto recipes, docs, and Codex project config."
config_file = "agents/reviewer.toml"
nickname_candidates = ["Reviewer", "Inspector"]

[agents.build-resolver]
description = "Implementation agent for fixing a specific kernel, U-Boot, Yocto, driver, or script build failure."
config_file = "agents/build-resolver.toml"
nickname_candidates = ["Builder", "Fixer"]

[agents.debugger]
description = "Read-only post-mortem debugger for oops, probe failure, DT bind issues, Yocto runtime issues, and logs."
config_file = "agents/debugger.toml"
nickname_candidates = ["Debugger", "Triage"]

[agents.board-runner]
description = "Live UART debug agent for BeagleBone board sessions. Requires explicit user approval before hardware access."
config_file = "agents/board-runner.toml"
nickname_candidates = ["Board Runner", "UART"]

[agents.doc-updater]
description = "Documentation updater for keeping vault/wiki synchronized with implemented BSP changes."
config_file = "agents/doc-updater.toml"
nickname_candidates = ["Doc Updater", "Wiki"]
