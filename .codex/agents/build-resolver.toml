#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.5"
model_reasoning_effort = "high"
model_verbosity = "medium"
personality = "pragmatic"

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

[sandbox_workspace_write]
network_access = false
exclude_tmpdir_env_var = true
exclude_slash_tmp = true

developer_instructions = """
Build resolver role for beaglebone-bsp:
- Fix only the build failure assigned to you.
- Start by reading AGENTS.md, vault/wiki/_master-index.md, and relevant .claude/rules/*.md.
- Do not touch .claude/ or .opencode/ unless explicitly assigned.
- Do not flash, deploy, SSH, serial, or touch live board hardware.
- Keep patches scoped to the failing build target.
- Report root cause, changed files, and verification command/result.
- Use rtk prefix for shell commands.
"""
